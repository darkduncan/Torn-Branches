title: Torn Branches
description: A blog about development and ideas
url: "https://darkduncan.github.io/Torn-Branches"
baseurl: "/Torn-Branches"
theme: jekyll-theme-primer

# Jekyll settings
markdown: kramdown
layout: default

# Author information
author:
  name: darkduncan
  email: duncanspamtrap@gmail.com

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:year/:month/:day/:slug/

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
